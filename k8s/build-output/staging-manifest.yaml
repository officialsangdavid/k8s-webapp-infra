apiVersion: v1
kind: Namespace
metadata:
  name: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp
  namespace: staging
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: staging
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: webapp
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWORD
              name: webapp-secret
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              key: API_KEY
              name: webapp-secret
        image: nginx:1.25
        name: webapp
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      serviceAccountName: webapp
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webapp-secret
  namespace: staging
spec:
  data:
  - remoteRef:
      key: staging/webapp
      property: DB_PASSWORD
    secretKey: DB_PASSWORD
  - remoteRef:
      key: staging/webapp
      property: API_KEY
    secretKey: API_KEY
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cluster-store
  target:
    creationPolicy: Owner
    name: webapp-secret
